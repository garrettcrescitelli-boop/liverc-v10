# Fly.io config — generated by rc-scoreboard
# Edit "app" below to match the name you chose during "fly launch"
app = "rc-scoreboard"
primary_region = "ord"

[build]

# Keep the machine always running — the LiveRC relay needs a
# persistent WebSocket connection and cannot be woken on demand.
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
